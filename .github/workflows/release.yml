# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Pre-release type"
        type: choice
        default: none
        options:
          - none
          - alpha
          - beta
          - rc
      auto_merge:
        description: "Enable auto-merge on the release PR"
        type: boolean
        default: false

concurrency:
  group: "${{ github.workflow }}-${{ inputs.prerelease }}"
  cancel-in-progress: true # only last step is important, which runs or doesn't

permissions:
  contents: write # to create branches
  issues: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Only on main
        if: |
          github.ref != 'refs/heads/main'
        shell: bash
        run: |
          echo "Only to be executed on main"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          show-progress: false
          token: ${{ secrets.TOKEN_TO_TRIGGER_SUBSEQUENT_WORKFLOWS }}

      - name: Install git-cliff to generate changelog & next version number
        uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3 # v2.77.1
        with:
          tool: git-cliff

      - name: Compute version, generate changelog, create branch and open PR
        shell: bash
        id: release
        run: |
          git config --global user.name github-actions[bot]
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com

          latest_tag=$(git describe --tags --abbrev=0 || true)

          prerelease="${{ inputs.prerelease }}"

          echo "::notice::Latest tag: ${latest_tag:-none}"
          echo "::notice::Pre-release type: ${prerelease}"

          if [ -n "${latest_tag}" ] && [ -z "$(git log "${latest_tag}..HEAD" --oneline)" ]; then
            # no commits since last tag, only allow if this is a promotion through pre-release stages
            tier_of() {
              case "$1" in
                alpha) echo 0 ;;
                beta)  echo 1 ;;
                rc)    echo 2 ;;
                none)  echo 3 ;;
                *)     echo -1 ;;
              esac
            }

            if [[ "${latest_tag}" =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
              latest_type="${BASH_REMATCH[1]}"
            else
              latest_type="none"
            fi

            latest_tier=$(tier_of "${latest_type}")
            requested_tier=$(tier_of "${prerelease}")

            if [ "${requested_tier}" -le "${latest_tier}" ]; then
              echo "::error::No commits since ${latest_tag} and ${prerelease} is not a promotion from ${latest_type}."
              exit 1
            fi
          fi

          bump_flag="auto"
          bumped=$(git-cliff --bumped-version --bump ${bump_flag} --unreleased --github-token ${{ secrets.GITHUB_TOKEN }})

          # If git-cliff didn't bump (e.g. chore/ci only commits), force a patch increment
          # so we never release the same version as the last tag.
          if [ "${bumped}" = "${latest_tag}" ]; then
            bump_flag="patch"
            bumped=$(git-cliff --bumped-version --bump patch --unreleased --github-token ${{ secrets.GITHUB_TOKEN }})
            echo "::notice::No conventional bump detected, forcing patch bump"
          fi

          version="${bumped}"

          # Strip any pre-release suffix git-cliff may have picked up (keep only vX.Y.Z)
          [[ "$version" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+) ]] && version="${BASH_REMATCH[1]}"
          echo "::notice::Base version: ${version}"
          echo "version=$version" >> "${GITHUB_OUTPUT}"

          if [ "${prerelease}" != "none" ]; then
            # Pre-release types in ascending order
            pre_types=("alpha" "beta" "rc")

            # Find the index of the requested pre-release type
            requested_index=-1
            for i in "${!pre_types[@]}"; do
              if [ "${pre_types[$i]}" = "${prerelease}" ]; then
                requested_index=$i
              fi
            done

            # Check if a higher-tier pre-release already exists for this base version
            for i in "${!pre_types[@]}"; do
              if [ "$i" -gt "$requested_index" ]; then
                if git tag --list "${version}-${pre_types[$i]}.*" | grep -q .; then
                  echo "::error::Cannot create ${prerelease} pre-release: ${pre_types[$i]} pre-release already exists for ${version}."
                  exit 1
                fi
              fi
            done

            # Determine the next pre-release number by finding the highest existing tag with this suffix
            latest_pre=$(git tag --list "${version}-${prerelease}.*" | sort --field-separator . --key 4 --numeric-sort | tail -1)

            if [ -n "$latest_pre" ]; then
              pre_number=$(( ${latest_pre##*-${prerelease}.} + 1 ))
            else
              pre_number=1
            fi

            release_version="${version}-${prerelease}.${pre_number}"
          else
            release_version="${version}"
          fi

          echo "::notice::Release version: ${release_version}"
          echo "release_version=$release_version" >> "${GITHUB_OUTPUT}"

          branch="release/${release_version}"
          echo "::notice::Branch: ${branch}"
          echo "branch=$branch" >> "${GITHUB_OUTPUT}"

          # Create or reset the branch to current main
          if git ls-remote --exit-code --heads origin "${branch}" > /dev/null 2>&1; then
            git checkout -B "${branch}" origin/main
          else
            git checkout -b "${branch}"
          fi

          commit_message="chore(release): prepare for ${release_version}"

          git-cliff --output CHANGELOG.md --tag "${release_version}" --github-token ${{ secrets.GITHUB_TOKEN }}

          git add CHANGELOG.md

          git commit --message "${commit_message}"

          git push --set-upstream origin "${branch}" --force

          # Build the PR-body changelog from a context whose compare-link target
          # is the release-branch head SHA, because the ${release_version} tag
          # doesn't exist until after this PR is merged.
          release_sha=$(git rev-parse HEAD)

          git-cliff --context --unreleased --tag "${release_version}" --github-token ${{ secrets.GITHUB_TOKEN }} \
            | jq --arg sha "${release_sha}" '.[0].extra = {compare_to: $sha}' \
            > diff-context.json

          git-cliff --from-context diff-context.json --output diff-CHANGELOG.md

      - name: Open or update pull request
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TOKEN_TO_TRIGGER_SUBSEQUENT_WORKFLOWS }}
        run: |
          branch="${{ steps.release.outputs.branch }}"
          release_version="${{ steps.release.outputs.release_version }}"

          # Truncate diff-CHANGELOG.md if it exceeds GitHub's PR character body limit
          max_length=65536
          truncation_message=$'\n\n---\n\n> **Note:** Changelog was truncated because it exceeded GitHub'"'"'s 65,536 character limit.'
          file_length=$(wc --chars < diff-CHANGELOG.md)

          if [ "$file_length" -gt "$max_length" ]; then
            truncated_length=$(( max_length - ${#truncation_message} ))
            head --bytes="$truncated_length" diff-CHANGELOG.md > diff-CHANGELOG-truncated.md
            printf '%s' "$truncation_message" >> diff-CHANGELOG-truncated.md
            mv diff-CHANGELOG-truncated.md diff-CHANGELOG.md
          fi

          # Check if a PR already exists for this branch
          existing_pr=$(gh pr list --head "${branch}" --state open --json number --jq '.[0].number // empty')

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --body-file diff-CHANGELOG.md
            pr_number="$existing_pr"
          else
            pr_number=$(gh pr create \
              --base main \
              --head "${branch}" \
              --title "chore(release): Release ${release_version}" \
              --body-file diff-CHANGELOG.md)
          fi

          if [ "${{ inputs.auto_merge }}" = "true" ]; then
            gh pr merge "$pr_number" --auto --merge
          fi
