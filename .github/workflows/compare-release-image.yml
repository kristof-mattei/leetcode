# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Compare release image

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  repo-has-container:
    name: Repo has container?
    runs-on: ubuntu-slim
    if: startsWith(github.head_ref, 'release/v')
    outputs:
      has_container: ${{ steps.determine.outputs.has_container }}
    steps:
      - name: Repo has docker container?
        shell: bash
        id: determine
        run: |
          has_container="${{ vars.HAS_CONTAINER }}"
          echo "has_container=${has_container:-false}" >> "${GITHUB_OUTPUT}"

  compare:
    name: Compare release image against latest
    runs-on: ubuntu-latest
    needs:
      - repo-has-container
    if: fromJSON(needs.repo-has-container.outputs.has_container) == true
    steps:
      - name: Set full image name
        shell: bash
        run: |
          echo "FULL_IMAGE_NAME=${REGISTRY,,}/${IMAGE_NAME,,}" >> "${GITHUB_ENV}"

      - name: Set up Docker
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Scout Compare (linux/amd64)
        uses: docker/scout-action@ce97ec1bb85613e8eb35d086fad0c77a6cedf983 # v1.23.0
        with:
          command: compare
          image: "${{ env.FULL_IMAGE_NAME }}:edge"
          platform: linux/amd64
          to: "${{ env.FULL_IMAGE_NAME }}:latest"
          dockerhub-user: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          organization: ${{ vars.DOCKERHUB_USERNAME }}

      - name: Docker Scout Compare (linux/arm64)
        uses: docker/scout-action@ce97ec1bb85613e8eb35d086fad0c77a6cedf983 # v1.23.0
        with:
          command: compare
          image: "${{ env.FULL_IMAGE_NAME }}:edge"
          platform: linux/arm64
          to: "${{ env.FULL_IMAGE_NAME }}:latest"
          dockerhub-user: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          organization: ${{ vars.DOCKERHUB_USERNAME }}
