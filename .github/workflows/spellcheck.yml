# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Spellcheck

on:
  pull_request:
    branches:
      - main

concurrency:
  # each new commit to a PR runs this workflow
  # so we need to avoid a long running older one from overwriting the "pr-<number>-latest"
  group: "${{ github.workflow }} @ ${{ github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  NPM_CONFIG_FUND: false

jobs:
  spellcheck:
    name: Spellcheck
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false

      - name: Make sure dictionary words are sorted and unique
        shell: bash
        run: |
          FILE="project-words.txt"

          # `sort` makes sure the words are sorted and contain no duplicates.
          #
          # Since `sort` is sensitive to locale, we set it
          # using LC_ALL to en_US.UTF8 to be consistent in different
          # environments.

          (
            LC_ALL=en_US.UTF8 sort --check --unique "$FILE"
          ) || {
            echo "Dictionary is not in sorted order. Correct order is:"
            LC_ALL=en_US.UTF8 sort --unique "$FILE"
            false
          }

      - name: Detect trailing whitespace
        shell: bash
        run: |
          if grep --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=target --binary-files=without-match --recursive --line-number --regexp='\s$' .
          then
              echo ''
              echo 'Please remove trailing whitespace from these lines.'
              exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile

      - name: Run cspell
        shell: bash
        run: |
          if ! pnpm spellcheck
          then
              echo ''
              echo ''
              echo 'If this is a real word, then you can add it to project-words.txt'
              exit 1
          fi
